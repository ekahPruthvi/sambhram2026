<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Sambhram2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{--s: 170px;
  --c1: #1a4341;
  --c2: #4f807c;
  --c3: #356260;
  --thickness: 15px;

  background-color: var(--c1);

  background-image: repeating-linear-gradient(
      45deg,
      var(--c2) 0 var(--thickness),
      transparent var(--thickness) calc(var(--thickness) * 2)
    ),
    repeating-linear-gradient(
      -45deg,
      var(--c3) 0 var(--thickness),
      transparent var(--thickness) calc(var(--thickness) * 2)
    );

  background-size: var(--s) var(--s);height: 100vh; display: flex;flex-direction: column;}
        .search{margin:2rem auto 0;margin-bottom: 10vh; max-width:28rem;display:flex;align-items:center;gap:.75rem;background:#000000;border:1px solid hsl(0, 0%, 27%);border-radius:20px;padding:.75rem 1rem;box-shadow:0 1px 3px hsl(220 20% 12%/.04);transition:box-shadow .2s,border-color .2s}
        .search:focus-within{box-shadow:0 8px 24px hsl(220 20% 12%/.08);border-color:hsl(160,40%,42%)}
        .search svg{flex-shrink:0;color:hsl(220,10%,46%)}
        .search input{flex:1;border:none;outline:none;background:transparent;font-size:.9375rem;color:hsl(217, 27%, 66%);font-family:inherit}
        .search input::placeholder{color:hsl(0, 0%, 87%)}
        .grid{max-width:70vw;flex-grow: 1;height: 100%;flex-shrink:0; margin:0 auto;padding:0 1.5rem 5rem;display:grid;gap:1rem;grid-template-columns:1fr}
        @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}}
        .empty{grid-column:1/-1;text-align:center;padding:5rem 1rem;color:hsl(0, 0%, 100%);display:none; background: linear-gradient(to right, #0000, black, #0000);}
        .empty p:first-child{font-size:1.125rem;font-weight:500}
        .empty p:last-child{font-size:.875rem;margin-top:.25rem}
        @keyframes cardIn{from{opacity:0;transform:translateY(16px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
        header{background: linear-gradient(rgba(0, 0, 0, 0.62),transparent);width: 100vw;}
        @media screen and (max-width: 767px) {
            .headspace h1{
                font-size: 10vh;
            }

            .inner-card.active {
                opacity: 0;
            }

            .try {
                width: 70vw;
                height: 50vh;
                z-index: 99;
                border-radius: 20px;
            }

            .grid {
                max-width: 100vw;
            }
        }
    </style>
</head>

<body>
    <menu class="menu-btn" id="menu">Menu</menu>
    <img class="disk" src="./img/diskeve.svg"></img>

    <header>
        <a href="./index.html"><img class="sam" src="img/samlogo.avif" alt=""></img></a>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li class="active">Events</li>
                <li><a href="./contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <div class="headspace">
        <h1>All Events</h1>
    </div>

    <div class="search">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search events" ></input>
    </div>

    <div class="empty" id="empty">
        <p>No results found</p>
        <p>Try a different search term.</p>
    </div>
    <div class="popup hidden" id="popup">
        <img src="./img/x.svg" onclick="closePopup()" class="closepop"></img>
        <div id="pack">
            <div id="imgpop"></div>
            <div id="popcontent"></div>
        </div>
    </div>
    <div class="grid" id="grid"></div>

            </p>
        </div>
        <img src="./img/load.svg"></img>

</body>

<script src="event.js"></script>

</html>
