<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Sambhram2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body{background-color: antiquewhite;}
        .search{margin:2rem auto 0;max-width:28rem;display:flex;align-items:center;gap:.75rem;background:#fff;border:1px solid hsl(40,12%,88%);border-radius:.75rem;padding:.75rem 1rem;box-shadow:0 1px 3px hsl(220 20% 12%/.04);transition:box-shadow .2s,border-color .2s}
        .search:focus-within{box-shadow:0 8px 24px hsl(220 20% 12%/.08);border-color:hsl(160,40%,42%)}
        .search svg{flex-shrink:0;color:hsl(220,10%,46%)}
        .search input{flex:1;border:none;outline:none;background:transparent;font-size:.9375rem;color:hsl(220,20%,12%);font-family:inherit}
        .search input::placeholder{color:hsl(220,10%,46%)}
        .grid{max-width:64rem;margin:0 auto;padding:0 1.5rem 5rem;display:grid;gap:1rem;grid-template-columns:1fr}
        @media(min-width:640px){.grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:1024px){.grid{grid-template-columns:repeat(3,1fr)}}
        .card{background:#fff;border:1px solid hsl(40,12%,88%);border-radius:.75rem;padding:1.5rem;box-shadow:0 1px 3px hsl(220 20% 12%/.04);transition:box-shadow .3s,transform .3s;animation:cardIn 500ms cubic-bezier(.16,1,.3,1) both}
        .card:hover{box-shadow:0 4px 12px hsl(220 20% 12%/.06);transform:translateY(-2px)}
        .card-head{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
        .card-icon{width:2.25rem;height:2.25rem;border-radius:.5rem;background:hsl(160,40%,42%,.12);color:hsl(160,40%,42%);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;flex-shrink:0}
        .card-head h2{font-size:1rem;font-weight:600;line-height:1.25}
        .card p{color:hsl(220,10%,46%);font-size:.875rem;line-height:1.6}
        .empty{grid-column:1/-1;text-align:center;padding:5rem 1rem;color:hsl(220,10%,46%);display:none}
        .empty p:first-child{font-size:1.125rem;font-weight:500}
        .empty p:last-child{font-size:.875rem;margin-top:.25rem}
        @keyframes cardIn{from{opacity:0;transform:translateY(16px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
    </style>
</head>

<body>
    <menu class="menu-btn" id="menu">Menu</menu>


    <header>
        <div class="logo"><img src="img/rvlogo.avif" alt=""><img  class="sam" src="img/samlogo.avif" alt=""></div>
        <nav>
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li class="active">Events</li>
                <li><a href="">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <h1>Directory</h1>
    <p>Browse and search through the collection below.</p>
    <div class="search">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search cards…" ></input>
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
        <p>No results found</p>
        <p>Try a different search term.</p>
    </div>
   
    <footer>
        <div class="foot">
            <p>
                RV INSTITUTE OF TECHNOLOGY AND MANAGEMENT ®<br>
                Chaithanya Layout, 8th Phase, J. P. Nagar, Bengaluru, Kothnur, Karnataka 560076
            </p>
        </div>
        <img src="./img/load.svg"></img>
    </footer> 
</body>

<script src="event.js"></script>

</html>
